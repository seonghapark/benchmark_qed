input:
  dataset_path: /storage/data/new_samples_local
  input_type: json
  text_column: abstract

encoding:
  model_name: o200k_base
  chunk_size: 256
  chunk_overlap: 3

sampling:
  num_clusters: 8
  num_samples_per_cluster: 8
  random_seed: 42

chat_model:
  model: Qwen/Qwen2.5-1.5B-Instruct
  llm_provider: local.hf.chat
  concurrent_requests: 1
  init_args:
    device: auto
    trust_remote_code: true
  call_args:
    temperature: 0.0
    max_new_tokens: 128
  custom_providers:
    - model_type: chat
      name: local.hf.chat
      module: local_hf_provider
      model_class: HuggingFaceLocalChat

embedding_model:
  model: sentence-transformers/all-MiniLM-L6-v2
  llm_provider: local.hf.embedding
  concurrent_requests: 1
  init_args:
    device: auto
  custom_providers:
    - model_type: embedding
      name: local.hf.embedding
      module: local_hf_provider
      model_class: HuggingFaceLocalEmbedding

data_local:
  num_questions: 50
  oversample_factor: 2.0
