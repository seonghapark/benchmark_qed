## Input Configuration
input:
  dataset_path: /tmp/pes2o_v2val_individual/
  input_type: json
  text_column: text # The column in the dataset that contains the text to be processed. Modify this based on your dataset.
  metadata_columns: [title] # Additional metadata columns to include in the input. Modify this based on your dataset.
  file_encoding: utf-8-sig
  max_new_tokens: 256
  max_length: 512

## Encoder configuration
encoding:
  model_name: o200k_base
  chunk_size: 256
  chunk_overlap: 3
  max_new_tokens: 256
  max_length: 512

## Sampling Configuration
sampling:
  num_clusters: 64 # adjust this based on your dataset size and the number of questions you want to generate
  num_samples_per_cluster: 16
  random_seed: 42
  max_new_tokens: 256
  max_length: 512

## LLM Configuration
chat_model:
  max_new_tokens: 256
  max_length: 512
  model: Qwen/Qwen2.5-1.5B-Instruct
  api_key: local
  llm_provider: local.hf.chat
  concurrent_requests: 1
  init_args:
    device: auto
    trust_remote_code: true
  call_args:
    temperature: 0.0
    max_new_tokens: 256
    max_length: 512
  custom_providers:
    - model_type: chat
      name: local.hf.chat
      module: local_hf_provider
      model_class: HuggingFaceLocalChat
