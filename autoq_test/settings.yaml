embedding_model:
  model: Qwen/Qwen3-Embedding-0.6B
  api_key: local
  llm_provider: local.hf.embedding
  concurrent_requests: 1
  init_args:
    device: auto
  custom_providers:
    - model_type: embedding
      name: local.hf.embedding
      module: local_hf_provider
      model_class: HuggingFaceLocalEmbedding
